name: Lean Build + Axiom Audit

# Every push (every branch, not just main) must lake-build clean. A
# broken Lean compile cannot land — not on main, not on a feature
# branch. Failed CI marks the branch tip visibly red.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        shell: bash
        run: |
          set -eu
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          bash elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin toolchain
        run: |
          lean --version
          lake --version

      - name: Cache Mathlib .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Build all modules (full Lean sweep — gate)
        run: lake build

      - name: Per-file Lean sweep (defense-in-depth)
        run: |
          # Even if `lake build` succeeded, run each top-level Lean file
          # individually to catch any file that builds via cache but
          # fails when re-elaborated.
          #
          # Excludes:
          #   - **/Tactic/*Test.lean — test files use `example` blocks
          #     that emit warnings on bare re-elaboration.
          #   - VilleMathlibPR.lean — Mathlib-PR-style draft, namespaced
          #     under `MeasureTheory` not `Pythia`, excluded from the
          #     umbrella for the same reason.
          set -e
          for f in $(find Pythia -name '*.lean' -not -path '*/Tactic/*Test.lean' -not -name 'VilleMathlibPR.lean' | sort); do
            echo "::group::lake env lean $f"
            lake env lean "$f"
            echo "::endgroup::"
          done

      - name: Axiom audit
        run: |
          # Every public theorem under test must depend only on the Lean
          # kernel's trusted axioms: propext, Classical.choice, Quot.sound.
          # Anything else (e.g. sorryAx, added axioms) fails CI.
          lake env lean Pythia/AxiomAudit.lean > axiom-audit.txt 2>&1 || true
          cat axiom-audit.txt
          ! grep -E "^\s*(sorryAx|Mathlib\.Axioms|[A-Z][a-zA-Z]*\.axiom)" axiom-audit.txt
          grep -q "axioms" axiom-audit.txt
