name: Lean Build + Axiom Audit

# Aidan 2026-04-25 mainline-protection mandate: every push (every branch,
# not just main) must lake-build clean. A broken Lean compile cannot land
# anywhere — not on main, not on a feature branch. This trigger fires on
# every branch push so that a broken push fails CI immediately and the
# branch tip is visibly red on the PR/branch view.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        shell: bash
        run: |
          set -eu
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          bash elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin toolchain
        run: |
          lean --version
          lake --version

      - name: Cache Mathlib .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Build all modules (full Lean sweep — gate)
        run: |
          # Per Aidan 2026-04-25 mandate: a single broken Lean file fails
          # the build, which fails this CI step, which marks the branch
          # tip red. No further steps run. This is the mainline-protection
          # gate.
          lake build

      - name: Per-file Lean sweep (defense-in-depth)
        run: |
          # Even if `lake build` succeeded, run each top-level Lean file
          # individually to catch any file that builds via cache but
          # fails when re-elaborated (rare but possible during cache
          # warmup). Treat every elaboration error as fatal.
          #
          # Excludes:
          #   - **/Tactic/*Test.lean — test files use `example` blocks that
          #     elaborate fine in build but emit warnings on bare re-elaboration.
          #   - VilleMathlibPR.lean — Mathlib-PR-style draft, intentionally
          #     namespaced under `MeasureTheory` not `Kairos.Stats`, excluded
          #     from the umbrella for the same reason. Per the "no upstream
          #     PR" mandate (Aidan 2026-04-25) this file has no shipping
          #     consumers; per-file sweep skip is the correct treatment.
          set -e
          for f in $(find Kairos -name '*.lean' -not -path '*/Tactic/*Test.lean' -not -name 'VilleMathlibPR.lean' | sort); do
            echo "::group::lake env lean $f"
            lake env lean "$f"
            echo "::endgroup::"
          done

      - name: Axiom audit
        run: |
          # Every public theorem under test must depend only on the Lean
          # kernel's trusted axioms: propext, Classical.choice, Quot.sound.
          # Anything else (e.g. sorryAx, added axioms) fails CI.
          lake env lean Kairos/Stats/AxiomAudit.lean > axiom-audit.txt 2>&1 || true
          cat axiom-audit.txt
          # Forbid any axiom line that is not in the trusted set.
          ! grep -E "^\s*(sorryAx|Mathlib\.Axioms|[A-Z][a-zA-Z]*\.axiom)" axiom-audit.txt
          # Must contain at least one "axioms" report — proves audit ran.
          grep -q "axioms" axiom-audit.txt
