name: Lean Build + Axiom Audit

# Every push (every branch, not just main) must lake-build clean. A
# broken Lean compile cannot land — not on main, not on a feature
# branch. Failed CI marks the branch tip visibly red.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Tier 1 — elan toolchain cache.
      # Keyed on the lean-toolchain file content. Invalidates only on
      # toolchain bump (rare). Avoids the curl + install on warm runs.
      - name: Cache elan toolchain
        id: cache-elan
        uses: actions/cache@v5
        with:
          path: ~/.elan
          key: pythia-elan-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}
          restore-keys: |
            pythia-elan-${{ runner.os }}-

      - name: Install elan
        if: steps.cache-elan.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -eu
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          bash elan-init.sh -y --default-toolchain none

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin toolchain
        run: |
          lean --version
          lake --version

      # Tier 2 — resolved dependency tree (.lake/packages).
      # Holds the cloned mathlib + transitive deps. Keyed on
      # lake-manifest.json so it only rotates on `lake update`.
      - name: Cache .lake/packages (deps tree)
        uses: actions/cache@v5
        with:
          path: .lake/packages
          key: pythia-lake-packages-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}
          restore-keys: |
            pythia-lake-packages-${{ runner.os }}-

      # Tier 3 — compiled olean output (.lake/build).
      # Keyed on (toolchain, manifest, OS). Lifts whenever toolchain or
      # deps bump. Restore-keys allow a partial-match warm boot so a
      # near-miss still seeds most of the cache.
      - name: Cache .lake/build (olean output)
        uses: actions/cache@v5
        with:
          path: .lake/build
          key: pythia-lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            pythia-lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-
            pythia-lake-build-${{ runner.os }}-

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Build all modules (full Lean sweep — gate)
        run: lake build

      - name: Per-file Lean sweep (defense-in-depth)
        run: |
          # Even if `lake build` succeeded, run each top-level Lean file
          # individually to catch any file that builds via cache but
          # fails when re-elaborated.
          #
          # Excludes:
          #   - **/Tactic/*Test.lean — test files use `example` blocks
          #     that emit warnings on bare re-elaboration.
          #   - VilleMathlibPR.lean — Mathlib-PR-style draft, namespaced
          #     under `MeasureTheory` not `Pythia`, excluded from the
          #     umbrella for the same reason.
          set -e
          for f in $(find Pythia -name '*.lean' -not -path '*/Tactic/*Test.lean' -not -name 'VilleMathlibPR.lean' | sort); do
            echo "::group::lake env lean $f"
            lake env lean "$f"
            echo "::endgroup::"
          done

      - name: Axiom audit
        run: |
          # Every public theorem under test must depend only on the Lean
          # kernel's trusted axioms: propext, Classical.choice, Quot.sound.
          # Anything else (e.g. sorryAx, added axioms) fails CI.
          lake env lean Pythia/AxiomAudit.lean > axiom-audit.txt 2>&1 || true
          cat axiom-audit.txt
          ! grep -E "^\s*(sorryAx|Mathlib\.Axioms|[A-Z][a-zA-Z]*\.axiom)" axiom-audit.txt
          grep -q "axioms" axiom-audit.txt
